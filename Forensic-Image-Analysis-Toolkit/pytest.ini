[pytest]
# Pytest Configuration for Veritas Forensic Image Analysis Toolkit

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directory to search for tests
testpaths = tests

# Minimum version
minversion = 7.0

# Command line options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=analysis
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests that measure performance
    requires_samples: marks tests that need sample images

# Coverage configuration
[coverage:run]
source = analysis
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */temp/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
